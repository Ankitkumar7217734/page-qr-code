<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="Page QR">
  <defs>
    <linearGradient id="bg" x1="14" y1="4" x2="116" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FA3AE"/>
      <stop offset="0.42" stop-color="#2A6F7A"/>
      <stop offset="1" stop-color="#153F47"/>
    </linearGradient>
    <linearGradient id="sheen" x1="64" y1="8" x2="64" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="paper" x1="50" y1="42" x2="86" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFEFB"/>
      <stop offset="1" stop-color="#E2EDF0"/>
    </linearGradient>
    <linearGradient id="fold" x1="69" y1="40" x2="86" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D7E6EA"/>
      <stop offset="1" stop-color="#AFC7CE"/>
    </linearGradient>
    <filter id="tileShadow" x="-14%" y="-14%" width="128%" height="128%">
      <feDropShadow dx="0" dy="3.5" stdDeviation="3.2" flood-color="#0B2A30" flood-opacity="0.32"/>
    </filter>
    <filter id="pageShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.4" flood-color="#0B2A30" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)" filter="url(#tileShadow)"/>
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#sheen)"/>
  <rect x="10.5" y="10.5" width="107" height="107" rx="26.2" stroke="#FFFFFF" stroke-opacity="0.22"/>

  <!-- Quiet zone plate -->
  <rect x="22" y="22" width="84" height="84" rx="11" fill="#0C333A" fill-opacity="0.2"/>

  <!--
    Module grid: origin (28,28), pitch 6, module 4.2
    Finder eyes occupy 7x7 modules at TL/TR/BL
  -->

  <!-- Finder outlines (7 modules = 42px including stroke visual) -->
  <g fill="none" stroke="#F8FCFD" stroke-width="3.5" stroke-linejoin="round">
    <rect x="27" y="27" width="28" height="28" rx="5"/>
    <rect x="73" y="27" width="28" height="28" rx="5"/>
    <rect x="27" y="73" width="28" height="28" rx="5"/>
  </g>
  <g fill="#F8FCFD">
    <rect x="34.4" y="34.4" width="13.2" height="13.2" rx="2.6"/>
    <rect x="80.4" y="34.4" width="13.2" height="13.2" rx="2.6"/>
    <rect x="34.4" y="80.4" width="13.2" height="13.2" rx="2.6"/>
  </g>

  <!-- Timing row between TL and TR finders -->
  <g fill="#F8FCFD">
    <rect x="61" y="31.4" width="4.2" height="4.2" rx="1"/>
    <rect x="61" y="37.4" width="4.2" height="4.2" rx="1" opacity="0.38"/>
    <rect x="67" y="31.4" width="4.2" height="4.2" rx="1" opacity="0.38"/>
    <rect x="67" y="37.4" width="4.2" height="4.2" rx="1"/>
  </g>

  <!-- Timing column between TL and BL finders -->
  <g fill="#F8FCFD">
    <rect x="31.4" y="61" width="4.2" height="4.2" rx="1"/>
    <rect x="37.4" y="61" width="4.2" height="4.2" rx="1" opacity="0.38"/>
    <rect x="31.4" y="67" width="4.2" height="4.2" rx="1" opacity="0.38"/>
    <rect x="37.4" y="67" width="4.2" height="4.2" rx="1"/>
  </g>

  <!-- Right data column -->
  <g fill="#F8FCFD">
    <rect x="73" y="61" width="4.2" height="4.2" rx="1"/>
    <rect x="79" y="61" width="4.2" height="4.2" rx="1" opacity="0.42"/>
    <rect x="85" y="61" width="4.2" height="4.2" rx="1"/>
    <rect x="91" y="61" width="4.2" height="4.2" rx="1" opacity="0.32"/>
    <rect x="97" y="61" width="4.2" height="4.2" rx="1"/>

    <rect x="85" y="67" width="4.2" height="4.2" rx="1" opacity="0.42"/>
    <rect x="91" y="67" width="4.2" height="4.2" rx="1"/>
    <rect x="97" y="67" width="4.2" height="4.2" rx="1" opacity="0.38"/>

    <rect x="91" y="73" width="4.2" height="4.2" rx="1" opacity="0.45"/>
    <rect x="97" y="73" width="4.2" height="4.2" rx="1"/>

    <rect x="79" y="79" width="4.2" height="4.2" rx="1"/>
    <rect x="85" y="79" width="4.2" height="4.2" rx="1" opacity="0.5"/>
    <rect x="91" y="79" width="4.2" height="4.2" rx="1"/>
    <rect x="97" y="79" width="4.2" height="4.2" rx="1" opacity="0.35"/>
  </g>

  <!-- Bottom data row -->
  <g fill="#F8FCFD">
    <rect x="61" y="85" width="4.2" height="4.2" rx="1" opacity="0.4"/>
    <rect x="67" y="85" width="4.2" height="4.2" rx="1"/>
    <rect x="73" y="85" width="4.2" height="4.2" rx="1" opacity="0.45"/>
    <rect x="79" y="85" width="4.2" height="4.2" rx="1"/>
    <rect x="85" y="85" width="4.2" height="4.2" rx="1" opacity="0.35"/>
    <rect x="91" y="85" width="4.2" height="4.2" rx="1"/>
    <rect x="97" y="85" width="4.2" height="4.2" rx="1" opacity="0.42"/>

    <rect x="61" y="91" width="4.2" height="4.2" rx="1"/>
    <rect x="67" y="91" width="4.2" height="4.2" rx="1" opacity="0.38"/>
    <rect x="73" y="91" width="4.2" height="4.2" rx="1"/>
    <rect x="85" y="91" width="4.2" height="4.2" rx="1"/>
    <rect x="91" y="91" width="4.2" height="4.2" rx="1" opacity="0.4"/>
    <rect x="97" y="91" width="4.2" height="4.2" rx="1"/>

    <rect x="61" y="97" width="4.2" height="4.2" rx="1" opacity="0.35"/>
    <rect x="67" y="97" width="4.2" height="4.2" rx="1"/>
    <rect x="79" y="97" width="4.2" height="4.2" rx="1" opacity="0.45"/>
    <rect x="85" y="97" width="4.2" height="4.2" rx="1"/>
    <rect x="91" y="97" width="4.2" height="4.2" rx="1" opacity="0.38"/>
    <rect x="97" y="97" width="4.2" height="4.2" rx="1"/>
  </g>

  <!-- Center page -->
  <g filter="url(#pageShadow)">
    <rect x="51" y="46" width="30" height="36" rx="4.2" fill="url(#paper)" stroke="#10343B" stroke-opacity="0.18" stroke-width="1.1"/>
    <path d="M68.5 46H80.2c2.1 0 3.8 1.7 3.8 3.8V56.5H72.3c-2.1 0-3.8-1.7-3.8-3.8V46Z" fill="url(#fold)"/>
    <path d="M68.5 46v6.7c0 2.1 1.7 3.8 3.8 3.8H84" stroke="#10343B" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="56.5" y="57.5" width="17" height="2.15" rx="1.07" fill="#2A6F7A" opacity="0.58"/>
    <rect x="56.5" y="63.2" width="13.2" height="2.15" rx="1.07" fill="#2A6F7A" opacity="0.4"/>
    <rect x="56.5" y="68.9" width="15.4" height="2.15" rx="1.07" fill="#2A6F7A" opacity="0.28"/>
  </g>

  <!-- Amber scan brackets -->
  <g stroke="#E8B86D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M48.5 48.5h-7.5v7.5"/>
    <path d="M91.5 48.5h7.5v7.5"/>
    <path d="M48.5 91.5h-7.5v-7.5"/>
    <path d="M91.5 91.5h7.5v-7.5"/>
  </g>
</svg>
